<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Michelin Guide 2026 - Seoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --michelin-red: #bd1622;
            --michelin-dark: #1a1a1a;
            --michelin-gold: #c5a065;
            --michelin-bg: #fdfaf5;
            --michelin-white: #ffffff;
            --font-main: 'Noto Sans KR', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--michelin-bg);
        }

        /* 왼쪽 지도 영역 */
        #main-content {
            flex: 6.5;
            position: relative;
            border-right: 1.5px solid var(--michelin-red);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 오른쪽 사이드바 */
        #side-bar {
            flex: 3.5;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--michelin-white);
            min-width: 420px;
        }

        .header {
            padding: 40px 30px 20px 30px;
            background: var(--michelin-red);
            color: #fff;
            text-align: center;
        }

        .header h2 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .filter-container {
            padding: 15px 25px 25px 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--michelin-red);
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-btn {
            padding: 7px 14px;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: #fff;
            color: var(--michelin-red);
            font-weight: 700;
        }

        #restaurant-list {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: var(--michelin-bg);
            scroll-behavior: smooth;
        }

        /* 식당 카드 스타일 */
        .restaurant-item {
            position: relative;
            background: #fff;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: 0.4s;
        }

        .restaurant-item:hover {
            transform: translateY(-5px);
            border-color: var(--michelin-gold);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .restaurant-item.highlight {
            border: 2px solid var(--michelin-red);
            background: #fff9f9;
        }

        .res-name {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .res-address {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 15px;
        }

        .res-info-row {
            display: flex;
            gap: 10px;
        }

        .badge {
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-star {
            background: var(--michelin-red);
            color: #fff;
        }

        .badge-cate {
            color: var(--michelin-gold);
            border: 1px solid var(--michelin-gold);
        }

        /* 하트 CSS 추가 */
        .fav-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: #ddd;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }

        .fav-btn.active {
            color: var(--michelin-gold);
        }
    </style>
</head>

        // [연동 함수] 마커 클릭 시 실행
        function findAndShowRestaurant(targetName) {
            // 필터 초기화
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-group="all"]').classList.add('active');
            renderList(restaurantsData);

            // 강조 및 스크롤
            setTimeout(() => {
                const items = document.querySelectorAll('.restaurant-item');
                items.forEach(item => {
                    item.classList.remove('highlight');
                    if (item.querySelector('.res-name').innerText.trim() === targetName.trim()) {
                        item.classList.add('highlight');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 100);
        }

        function toggleFilter(btn) {
            const group = btn.getAttribute('data-group');
            const allBtn = document.querySelector('[data-group="all"]');
            const favBtn = document.querySelector('[data-group="fav"]');

            // 1. 전체 버튼 클릭
            if (group === 'all') {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
            }

            // 2. 즐겨찾기 버튼 클릭 -> 다른 필터와 중복 불가
            else if (group === 'fav') {
                const wasActive = btn.classList.contains('active');

                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

                // 이미 켜져 있던 즐겨찾기를 다시 누르면 전체로 복귀
                if (wasActive) {
                    allBtn.classList.add('active');
                } else {
                    favBtn.classList.add('active');
                }
            }

            // 3. 일반 필터(star, cate) 클릭 -> 즐겨찾기 자동 해제
            else {
                allBtn.classList.remove('active');
                if (favBtn) favBtn.classList.remove('active');

                btn.classList.toggle('active');

                // 아무 필터도 없으면 전체 자동 활성화
                if (document.querySelectorAll('.filter-btn.active').length === 0) {
                    allBtn.classList.add('active');
                }
            }

            applyFilters();
        }

        function applyFilters() {
            const activeBtns = document.querySelectorAll('.filter-btn.active');
            const allBtnActive = document.querySelector('[data-group="all"]').classList.contains('active');

            if (allBtnActive) {
                renderList(restaurantsData);
                return;
            }

            const filters = { fav: [], star: [], cate: [] };

            activeBtns.forEach(btn => {
                const group = btn.getAttribute('data-group');
                const val = btn.getAttribute('data-value');

                if (group !== 'all') {
                    filters[group].push(val);
                }
            });

            const filtered = restaurantsData.filter(res => {
                const matchFav = filters.fav.length === 0 || filters.fav.includes(String(res.isFavorite));
                const matchStar = filters.star.length === 0 || filters.star.includes(res.star);
                const matchCate = filters.cate.length === 0 || filters.cate.includes(res.food);

                return matchFav && matchStar && matchCate;
            });

            renderList(filtered);
        }
        // 즐겨찾기 토글 함수 추가
        function toggleFavorite(event, id) {
            event.stopPropagation();

            const restaurant = restaurantsData.find(item => item.id === id);
            if (restaurant) {
                restaurant.isFavorite = !restaurant.isFavorite;
            }

            applyFilters();
        }

        function renderList(data) {
            const listContainer = document.getElementById('restaurant-list');

            if (data.length === 0) {
                listContainer.innerHTML = `
            <p style="text-align:center; padding:40px; color:#999;">
                조건에 맞는 식당이 없습니다.
            </p>
        `;
                return;
            }

            listContainer.innerHTML = data.map(item => `
        <div class="restaurant-item">
            <span class="fav-btn ${item.isFavorite ? 'active' : ''}" onclick="toggleFavorite(event, ${item.id})">
                ${item.isFavorite ? '♥' : '♡'}
            </span>

            <div class="res-name">${item.name}</div>
            <div class="res-address">${item.addr}</div>
            <div class="res-info-row">
                <span class="badge badge-star">${item.star}</span>
                <span class="badge badge-cate">${item.food}</span>
            </div>
        </div>
    `).join('');
        }

        window.onload = () => renderList(restaurantsData);
    </script>
