<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Michelin Guide 2026 - 상세 주석 버전</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* [2. CSS 변수 설정] 
           색상이나 폰트를 변수로 지정해두면 전체 테마를 한 번에 바꿀 때 매우 편리합니다. */
        :root {
            --michelin-red: #bd1622;   /* 미슐랭 상징 레드 */
            --michelin-dark: #1a1a1a;  /* 기본 텍스트 색상 */
            --michelin-gold: #c5a065;  /* 즐겨찾기 및 포인트 골드 */
            --michelin-bg: #fdfaf5;    /* 부드러운 배경색 */
            --michelin-white: #ffffff; 
            --font-main: 'Noto Sans KR', sans-serif;
        }

        /* [3. 기본 스타일 초기화] 
           브라우저마다 기본으로 설정된 여백을 제거하고 전체 높이를 화면에 맞춥니다. */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: var(--font-main);
            display: flex;         /* 가로 배치(지도와 리스트)를 위한 설정 */
            height: 100vh;         /* 전체 화면 높이 사용 */
            overflow: hidden;      /* 바깥쪽 스크롤바를 숨겨서 애플리케이션 느낌 구현 */
            background-color: var(--michelin-bg);
            color: var(--michelin-dark);
            -webkit-font-smoothing: antialiased; /* 글꼴을 부드럽게 렌더링 */
        }

        /* [4. 왼쪽 지도 영역 - 65% 비중] */
        #main-content { 
            flex: 6.5;             /* 전체 너비 10 중 6.5를 할당 */
            position: relative;    /* 자식 요소인 'Back' 버튼의 위치 기준점 */
            background-color: #f1efeb;
            border-right: 1.5px solid var(--michelin-red); /* 컨셉의 수직 절취선 */
        }
        
        /* 상세페이지에서 지도로 복귀하는 버튼 */
        #back-to-map {
            position: absolute;    /* 화면 특정 위치에 고정 */
            top: 25px; left: 25px; 
            z-index: 100;          /* iframe보다 위로 띄움 */
            padding: 10px 22px; background: rgba(255,255,255,0.95); 
            border: 1px solid var(--michelin-gold);
            color: var(--michelin-gold); 
            font-weight: 700; font-size: 0.8rem;
            border-radius: 2px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1.5px; display: none; /* 평소에는 숨김 */
            transition: 0.3s;
        }
        #back-to-map:hover { background: var(--michelin-gold); color: #fff; }

        /* 초기 메인 로고 및 문구 */
        #map-placeholder { 
            width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
        }
        #map-placeholder h1 { 
            font-size: 3rem; color: var(--michelin-red); 
            font-weight: 900; letter-spacing: 8px; /* Noto Sans Black 두께 사용 */
        }

        /* [5. 오른쪽 리스트 영역 - 35% 비중] */
        #side-bar { 
            flex: 3.5; height: 100%; display: flex; flex-direction: column; 
            background: var(--michelin-white); min-width: 420px; 
        }

        /* 사이드바 상단 타이틀 */
        .header { 
            padding: 40px 30px 20px 30px; background: var(--michelin-red); color: #fff; 
            text-align: center;
        }
        .header h2 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 700; }
        .header p { font-size: 0.75rem; letter-spacing: 4px; margin-top: 5px; opacity: 0.8; font-weight: 300; }
        
        /* 다중 필터 버튼 컨테이너 */
        .filter-container { 
            padding: 15px 25px 25px 25px; display: flex; flex-wrap: wrap; gap: 8px; 
            background: var(--michelin-red); justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .filter-btn {
            padding: 7px 14px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.4);
            background: transparent; color: rgba(255,255,255,0.9); 
            font-size: 0.75rem; font-weight: 400;
            cursor: pointer; transition: 0.2s; letter-spacing: 0.5px;
        }
        .filter-btn.active { background: var(--michelin-white); color: var(--michelin-red); border-color: var(--michelin-white); font-weight: 700; }

        /* 실제 식당 리스트가 나열되고 스크롤되는 영역 */
        #restaurant-list { 
            flex: 1;               /* 남은 모든 수직 공간을 채움 */
            overflow-y: auto;      /* 내용이 넘치면 내부 스크롤바 생성 */
            padding: 25px; 
            background: var(--michelin-bg); 
        }

        /* [6. 식당 개별 카드 스타일] */
        .restaurant-item {
            position: relative;    /* 하트 아이콘의 기준점 */
            background: var(--michelin-white); padding: 30px; 
            margin-bottom: 30px; border: 1px solid #eee; cursor: pointer; transition: 0.4s ease;
        }
        .restaurant-item:hover { 
            transform: translateY(-5px); /* 마우스 올릴 때 살짝 위로 이동 */
            border-color: var(--michelin-gold); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        /* 카드 오른쪽 상단 즐겨찾기 하트 */
        .fav-btn { position: absolute; top: 30px; right: 30px; font-size: 1.6rem; color: #eee; cursor: pointer; z-index: 10; }
        .fav-btn.active { color: var(--michelin-gold); }

        /* 카드 내부 텍스트 디자인 */
        .res-name { font-size: 1.7rem; font-weight: 700; color: var(--michelin-dark); margin-bottom: 8px; letter-spacing: -0.5px; }
        .res-address { font-size: 0.85rem; color: #999; margin-bottom: 15px; font-weight: 300; }
        .res-review { font-size: 1rem; color: #444; margin-bottom: 20px; line-height: 1.6; font-weight: 400; }
        
        /* 카드 내부 배지(Star, Category) */
        .res-info-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { padding: 5px 12px; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .badge-star { background: var(--michelin-red); color: #fff; }
        .badge-cate { background: transparent; color: var(--michelin-gold); border: 1px solid var(--michelin-gold); }

        /* 하단 3장 사진 레이아웃 */
        .res-photos { display: flex; gap: 10px; height: 110px; }
        .res-photos img { flex: 1; width: 33.3%; object-fit: cover; border-radius: 1px; }

        /* 상세 정보 iframe */
        #detail-view { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <main id="main-content">
        <button id="back-to-map" onclick="goBackToMap()">← Return to Map</button>
        <div id="map-placeholder">
            <div>
                <h1>MICHELIN</h1>
                <p style="letter-spacing: 10px; color: #aaa; font-size: 0.8rem; margin-top: 10px; font-weight: 300;">GUIDE SELECTION</p>
            </div>
        </div>
        <iframe id="detail-view"></iframe>
    </main>

    <nav id="side-bar">
        <div class="header">
            <h2>Michelin</h2>
            <p>Selection 2026</p>
        </div>
        
        <div class="filter-container">
            <button class="filter-btn active" data-group="all" onclick="toggleFilter(this)">전체</button>
            <button class="filter-btn" data-group="fav" data-value="true" onclick="toggleFilter(this)">즐겨찾기</button>
            <button class="filter-btn" data-group="star" data-value="3" onclick="toggleFilter(this)">3 Stars</button>
            <button class="filter-btn" data-group="star" data-value="2" onclick="toggleFilter(this)">2 Stars</button>
            <button class="filter-btn" data-group="cate" data-value="한식" onclick="toggleFilter(this)">한식</button>
            <button class="filter-btn" data-group="cate" data-value="중식" onclick="toggleFilter(this)">중식</button>
            <button class="filter-btn" data-group="cate" data-value="양식" onclick="toggleFilter(this)">양식</button>
        </div>

        <div id="restaurant-list"></div>
    </nav>

    <script>
        /* [JS-1. 원본 데이터 정의] 
           나중에는 MariaDB로부터 이 형태의 데이터를 전달받게 됩니다. */
        let restaurantsData = [
            { id: 1, name: "가온", star: 3, address: "서울특별시 강남구 도산대로 317", review: "한식 고유의 미학을 예술로 승화시킨 공간", category: "한식", photos: ["https://picsum.photos/id/102/300/200", "https://picsum.photos/id/103/300/200", "https://picsum.photos/id/104/300/200"], url: "https://www.gaonkr.com", isFavorite: false },
            { id: 2, name: "쥬에", star: 2, address: "서울특별시 용산구 독서당로 124", review: "격조 높은 광둥식 요리의 진수를 보여주는 곳", category: "중식", photos: ["https://picsum.photos/id/225/300/200", "https://picsum.photos/id/292/300/200", "https://picsum.photos/id/306/300/200"], url: "https://www.michelin.com", isFavorite: true },
            { id: 3, name: "스테이", star: 1, address: "서울특별시 송파구 올림픽로 300", review: "환상적인 뷰와 함께 즐기는 모던 프렌치", category: "양식", photos: ["https://picsum.photos/id/429/300/200", "https://picsum.photos/id/431/300/200", "https://picsum.photos/id/433/300/200"], url: "https://www.lottehotel.com", isFavorite: true }
        ];

        /* [JS-2. 필터 버튼 클릭 시 작동 함수] */
        function toggleFilter(btn) {
            const group = btn.getAttribute('data-group');
            if (group === 'all') {
                // '전체' 클릭 시 다른 모든 필터 버튼의 활성화 상태 해제
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                // 특정 필터 클릭 시 '전체' 버튼을 끄고 해당 버튼 상태 반전(토글)
                document.querySelector('[data-group="all"]').classList.remove('active');
                btn.classList.toggle('active');
            }
            // 아무 필터도 켜져 있지 않다면 '전체' 자동 활성화
            if (document.querySelectorAll('.filter-btn.active').length === 0) {
                document.querySelector('[data-group="all"]').classList.add('active');
            }
            applyFilters(); // 필터링 적용 로직 실행
        }

        /* [JS-3. 중복 필터링 핵심 로직] 
           활성화된 모든 필터를 확인하여 모든 조건을 만족(AND)하는 식당만 거릅니다. */
        function applyFilters() {
            const activeBtns = document.querySelectorAll('.filter-btn.active');
            const allBtnActive = document.querySelector('[data-group="all"]').classList.contains('active');
            
            // '전체' 모드일 경우 필터링 없이 원본 출력
            if (allBtnActive) { renderList(restaurantsData); return; }

            const filters = { fav: [], star: [], cate: [] };
            activeBtns.forEach(btn => {
                const group = btn.getAttribute('data-group');
                const val = btn.getAttribute('data-value');
                if (group !== 'all') filters[group].push(val);
            });

            // 필터링 규칙: 각 카테고리의 조건이 하나라도 존재한다면 그중 하나에 해당해야 하고,
            // 모든 카테고리(Fav, Star, Cate)의 결과를 다 만족해야 함
            const filtered = restaurantsData.filter(res => {
                const matchFav = filters.fav.length === 0 || filters.fav.includes(res.isFavorite.toString());
                const matchStar = filters.star.length === 0 || filters.star.includes(res.star.toString());
                const matchCate = filters.cate.length === 0 || filters.cate.includes(res.category);
                return matchFav && matchStar && matchCate;
            });
            renderList(filtered);
        }

        /* [JS-4. 화면에 식당 목록 그리기] */
        function renderList(data) {
            const listContainer = document.getElementById('restaurant-list');
            if(data.length === 0) {
                listContainer.innerHTML = "<p style='text-align:center; padding:50px; color:#bbb; font-size:0.8rem; letter-spacing:2px;'>검색 결과가 없습니다.</p>";
                return;
            }
            // 데이터를 HTML 문자열로 변환하여 주입
            listContainer.innerHTML = data.map(item => `
                <div class="restaurant-item" onclick="loadDetail('${item.url}')">
                    <span class="fav-btn ${item.isFavorite ? 'active' : ''}" onclick="toggleFavorite(event, ${item.id})">
                        ${item.isFavorite ? '♥' : '♡'}
                    </span>
                    <div class="res-name">${item.name}</div>
                    <div class="res-address">${item.address}</div>
                    <div class="res-review">"${item.review}"</div>
                    <div class="res-info-row">
                        <span class="badge badge-star">${item.star} Star</span>
                        <span class="badge badge-cate">${item.category}</span>
                    </div>
                    <div class="res-photos">
                        ${item.photos.map(p => `<img src="${p}" alt="food">`).join('')}
                    </div>
                </div>
            `).join('');
        }

        /* [JS-5. 즐겨찾기 하트 처리] */
        async function toggleFavorite(event, id) {
            event.stopPropagation(); // 카드 클릭(상세페이지 열기) 이벤트가 발생하지 않도록 차단
            const target = restaurantsData.find(item => item.id === id);
            target.isFavorite = !target.isFavorite; // 데이터 상태 반전
            
            // 나중에 MariaDB 서버에 상태를 업데이트하는 POST 요청 코드가 들어갈 자리입니다.
            applyFilters(); // 현재 필터 상태를 유지하며 목록 갱신
        }

        /* [JS-6. 상세 정보 탭 열기] */
        function loadDetail(url) {
            const iframe = document.getElementById('detail-view');
            const placeholder = document.getElementById('map-placeholder');
            const backBtn = document.getElementById('back-to-map');

            placeholder.style.display = 'none'; // 초기 로고 숨김
            iframe.style.display = 'block';    // 정보창 노출
            iframe.src = url;                  // 링크 연결
            backBtn.style.display = 'block';   // 되돌아가기 버튼 표시
        }

        /* [JS-7. 지도로 돌아가기(초기화)] */
        function goBackToMap() {
            const iframe = document.getElementById('detail-view');
            const placeholder = document.getElementById('map-placeholder');
            const backBtn = document.getElementById('back-to-map');

            iframe.style.display = 'none';
            iframe.src = "";                   // 불필요한 리소스 사용 방지를 위해 빈 페이지로 초기화
            placeholder.style.display = 'flex';
            backBtn.style.display = 'none';
        }

        // 페이지가 처음 실행될 때 전체 목록을 그림
        window.onload = () => renderList(restaurantsData);
    </script>
</body>
</html>
