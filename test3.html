<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Michelin Guide 2026 - Seoul</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --michelin-red: #bd1622; --michelin-dark: #1a1a1a; --michelin-gold: #c5a065;
            --michelin-bg: #fdfaf5; --michelin-white: #ffffff; --font-main: 'Noto Sans KR', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); display: flex; height: 100vh; overflow: hidden; background-color: var(--michelin-bg); }

        /* 왼쪽 지도 영역 */
        #main-content { flex: 6.5; position: relative; border-right: 1.5px solid var(--michelin-red); }
        iframe { width: 100%; height: 100%; border: none; }

        /* 오른쪽 사이드바 */
        #side-bar { flex: 3.5; height: 100%; display: flex; flex-direction: column; background: var(--michelin-white); min-width: 420px; }
        .header { padding: 40px 30px 20px 30px; background: var(--michelin-red); color: #fff; text-align: center; }
        .header h2 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 700; }
        
        .filter-container { padding: 15px 25px 25px 25px; display: flex; flex-wrap: wrap; gap: 8px; background: var(--michelin-red); justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .filter-btn { padding: 7px 14px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: #fff; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .filter-btn.active { background: #fff; color: var(--michelin-red); font-weight: 700; }

        #restaurant-list { flex: 1; overflow-y: auto; padding: 25px; background: var(--michelin-bg); scroll-behavior: smooth; }

        /* 식당 카드 스타일 */
        .restaurant-item { position: relative; background: #fff; padding: 30px; margin-bottom: 30px; border: 1px solid #eee; cursor: pointer; transition: 0.4s; }
        .restaurant-item:hover { transform: translateY(-5px); border-color: var(--michelin-gold); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .restaurant-item.highlight { border: 2px solid var(--michelin-red); background: #fff9f9; }

        .res-name { font-size: 1.7rem; font-weight: 700; margin-bottom: 8px; }
        .res-address { font-size: 0.85rem; color: #999; margin-bottom: 15px; }
        .res-info-row { display: flex; gap: 10px; }
        .badge { padding: 5px 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-star { background: var(--michelin-red); color: #fff; }
        .badge-cate { color: var(--michelin-gold); border: 1px solid var(--michelin-gold); }
    </style>
</head>
<body>

    <main id="main-content">
        <iframe src="map_강남구.html" id="map-frame"></iframe>
    </main>

    <nav id="side-bar">
        <div class="header">
            <h2>Michelin</h2>
            <p>Selection 2026</p>
        </div>
        
        <div class="filter-container">
            <button class="filter-btn active" data-group="all" onclick="toggleFilter(this)">전체</button>
            <button class="filter-btn" data-group="star" data-value="3 Stars" onclick="toggleFilter(this)">3 Stars</button>
            <button class="filter-btn" data-group="star" data-value="2 Stars" onclick="toggleFilter(this)">2 Stars</button>
            <button class="filter-btn" data-group="cate" data-value="한식" onclick="toggleFilter(this)">한식</button>
            <button class="filter-btn" data-group="cate" data-value="스시" onclick="toggleFilter(this)">스시</button>
        </div>

        <div id="restaurant-list"></div>
    </nav>

    <script>
        // 데이터 (추후 DB 연동 시 이 객체만 교체)
        const restaurantsData = [
            { id: 1, name: "밍글스 (Mingles)", star: "3 Stars", food: "한식", addr: "서울 강남구 선릉로132길 19 2층" },
            { id: 2, name: "소수헌 (Sosuheon)", star: "2 Stars", food: "스시", addr: "서울 강남구 도산대로45길 8-5 2층" },
            { id: 3, name: "권숙수 (KwonSookSoo)", star: "2 Stars", food: "한식", addr: "서울 강남구 압구정로46길 27 4층" },
            { id: 4, name: "레스토랑 알렌 (Allen)", star: "2 Stars", food: "컨템포러리", addr: "서울 강남구 테헤란로 231 센터필드 2층" },
            { id: 5, name: "미토우 (Mitou)", star: "2 Stars", food: "일식", addr: "서울 강남구 언주로154길 14 2층" },
            { id: 6, name: "정식당 (Jungsik)", star: "2 Stars", food: "한식", addr: "서울 강남구 선릉로158길 11" },
            { id: 7, name: "코지마 (Kojima)", star: "2 Stars", food: "스시", addr: "서울 강남구 압구정로 443 6층" },
            { id: 8, name: "윤서울 (YUN)", star: "1 Star", food: "한식", addr: "서울 강남구 선릉로805 1층" }
        ];

        // [연동 함수] 마커 클릭 시 실행
        function findAndShowRestaurant(targetName) {
            // 필터 초기화
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-group="all"]').classList.add('active');
            renderList(restaurantsData);

            // 강조 및 스크롤
            setTimeout(() => {
                const items = document.querySelectorAll('.restaurant-item');
                items.forEach(item => {
                    item.classList.remove('highlight');
                    if (item.querySelector('.res-name').innerText.trim() === targetName.trim()) {
                        item.classList.add('highlight');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 100);
        }

        function toggleFilter(btn) {
            const group = btn.getAttribute('data-group');
            if (group === 'all') {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                document.querySelector('[data-group="all"]').classList.remove('active');
                btn.classList.toggle('active');
            }
            applyFilters();
        }

        function applyFilters() {
            const activeBtns = document.querySelectorAll('.filter-btn.active');
            const allBtnActive = document.querySelector('[data-group="all"]').classList.contains('active');
            if (allBtnActive) { renderList(restaurantsData); return; }

            const filters = { star: [], cate: [] };
            activeBtns.forEach(btn => {
                const group = btn.getAttribute('data-group');
                const val = btn.getAttribute('data-value');
                filters[group].push(val);
            });

            const filtered = restaurantsData.filter(res => {
                const matchStar = filters.star.length === 0 || filters.star.includes(res.star);
                const matchCate = filters.cate.length === 0 || filters.cate.includes(res.food);
                return matchStar && matchCate;
            });
            renderList(filtered);
        }

        function renderList(data) {
            const listContainer = document.getElementById('restaurant-list');
            listContainer.innerHTML = data.map(item => `
                <div class="restaurant-item">
                    <div class="res-name">${item.name}</div>
                    <div class="res-address">${item.addr}</div>
                    <div class="res-info-row">
                        <span class="badge badge-star">${item.star}</span>
                        <span class="badge badge-cate">${item.food}</span>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => renderList(restaurantsData);
    </script>
</body>
</html>
