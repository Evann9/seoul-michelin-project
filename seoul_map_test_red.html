<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Michelin Guide 2026 - Red & Cream Selection</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --michelin-red: #6C262A;      /* 메인 다크 레드 */
            --michelin-dark-red: #6C262A; 
            --michelin-bg: #fdfaf5;       
            --michelin-dark: #1a1a1a; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: var(--michelin-bg); }

        /* 왼쪽 지도 영역 설정 */
        #map-container { 
            flex: 6.5; 
            position: relative; 
            background-color: var(--michelin-red); 
        }
        #map { width: 100%; height: 100%; background: transparent !important; }

        /* 오른쪽 사이드바 및 리스트 설정 */
        #side-bar { 
            flex: 3.5; display: flex; flex-direction: column; background: white; 
            min-width: 400px; border-left: 2px solid var(--michelin-red); 
        }
        .header { padding: 35px; background: var(--michelin-red); color: white; text-align: center; }
        .header h2 { letter-spacing: 5px; font-weight: 700; text-transform: uppercase; }
        .header p { font-size: 0.8rem; margin-top: 5px; opacity: 0.9; }
        
        /* 상단 지역구 필터 버튼 */
        .filter-section { 
            padding: 15px; background: var(--michelin-dark-red); 
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; 
        }
        .gu-btn { 
            padding: 6px 14px; background: rgba(255,255,255,0.15); 
            border: 1px solid white; color: white; cursor: pointer; 
            font-size: 0.85rem; border-radius: 2px; transition: 0.3s;
        }
        .gu-btn:hover { background: rgba(255,255,255,0.3); }
        .gu-btn.active { background: white; color: var(--michelin-red); font-weight: bold; }

        #restaurant-list { flex: 1; overflow-y: auto; padding: 25px; background: var(--michelin-bg); scroll-behavior: smooth; }
        .restaurant-item { 
            background: white; padding: 20px; margin-bottom: 20px; 
            border: 1px solid #e0e0e0; transition: 0.4s; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .restaurant-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .restaurant-item.highlight { border: 2px solid var(--michelin-red); background: #fff9f9; }
        
        .res-name { font-size: 1.2rem; font-weight: 700; color: var(--michelin-dark); margin-bottom: 5px; }
        .res-addr { font-size: 0.8rem; color: #777; margin-bottom: 10px; }
        .res-badge { display: inline-block; padding: 3px 10px; font-size: 0.75rem; background: var(--michelin-red); color: white; border-radius: 2px; font-weight: 700; }
        .res-cuisine { margin-left: 8px; font-size: 0.8rem; color: #555; font-weight: 500; }

        /* 마커 호버 시 나타나는 툴팁 스타일 */
        .custom-tooltip {
            background-color: var(--michelin-dark) !important;
            border: 1px solid var(--michelin-red) !important;
            color: white !important;
            font-size: 13px !important;
            font-weight: bold !important;
            padding: 6px 12px !important;
            border-radius: 4px !important;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4) !important;
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <nav id="side-bar">
        <div class="header">
            <h2>MICHELIN</h2>

        </div>
        <div class="filter-section" id="gu-filter">
            <button class="gu-btn active" onclick="focusDistrict('전체', this)">전체</button>
            <button class="gu-btn" onclick="focusDistrict('강남구', this)">강남구</button>
            <button class="gu-btn" onclick="focusDistrict('용산구', this)">용산구</button>

            { id: 38, name: "윤서울 (YUN)", star: "1 Star", cuisine: "한식", addr: "서울 강남구 선릉로805", gu: "강남구" },
            { id: 39, name: "이스트 (y'east)", star: "1 Star", cuisine: "컨템포러리", addr: "서울 성동구 성수이로7길 27", gu: "성동구" },
            { id: 40, name: "이타닉 가든", star: "1 Star", cuisine: "컨템포러리", addr: "서울 강남구 테헤란로 231", gu: "강남구" },
            { id: 41, name: "익스퀴진 (Exquisine)", star: "1 Star", cuisine: "컨템포러리", addr: "서울 강남구 삼성로140길 6", gu: "강남구" },
            { id: 42, name: "제로 컴플렉스", star: "1 Star", cuisine: "이노베이티브", addr: "서울 중구 퇴계로6가길 30", gu: "중구" }
        ];

        // 지도 초기화 함수
        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.5665, 126.9780], 11);
            loadData();
            renderList('전체');
        }

        // 데이터 로드 및 레이어 생성 함수
        async function loadData() {
            try {
                // 1. 서울 구 경계 GeoJSON 로드
                const mapRes = await fetch('./data/geo/team_pro_seoul_map_4326.geojson');
                const mapData = await mapRes.json();

                geojsonLayer = L.geoJson(mapData, {
                    style: (feature) => {
                        const isTarget = targetGus.includes(feature.properties.SIG_KOR_NM);
                        return {
                            fillColor: '#fdfaf5', // 지도의 기본 크림색
                            color: '#6C262A',     // 구 경계 테두리 (다크 레드)
                            weight: 1.2, 
                            fillOpacity: isTarget ? 1 : 0.9
                        };
                    },
                    onEachFeature: (feature, layer) => {
                        const guName = feature.properties.SIG_KOR_NM;
                        if (targetGus.includes(guName)) {
                            layer.on({
                                mouseover: (e) => e.target.setStyle({ fillColor: '#ffffff', weight: 2.5 }), // 호버 시 화이트
                                mouseout: (e) => e.target.setStyle({ fillColor: '#fdfaf5', weight: 1.2 }),
                                click: (e) => focusDistrict(guName, null)
                            });
                        } else {
                            layer.options.interactive = false; // 미보유 구 클릭 차단
                        }
                    }
                }).addTo(map);

                // 2. 미쉐린 식당 좌표 GeoJSON 로드
                const pointRes = await fetch('./data/geo/team_pro_michelin_point_4326.geojson');
                const pointData = await pointRes.json();
                
                L.geoJson(pointData, {
                    pointToLayer: (feature, latlng) => {
                        const icon = L.icon({ iconUrl: './data/logo.png', iconSize: [20, 20] });
                        const marker = L.marker(latlng, { icon: icon });
                        
                        // [마커 라벨 오류 수정] 모든 키를 검사하여 '레스토' 키워드가 들어간 실제 식당명 추출
                        const props = feature.properties;
                        let resName = "정보 없음";
                        Object.keys(props).forEach(key => {
                            if (key.includes('name')) { resName = props[key]; }
                        });
                        
                        // 마커에 툴팁 바인딩
                        marker.bindTooltip(resName, {
                            direction: 'top',
                            offset: [0, -10],
                            className: 'custom-tooltip'
                        });

                        marker.on('click', () => highlightInList(resName));
                        return marker;
                    }
                }).addTo(map);

            } catch (e) { console.error("데이터 로드 중 오류 발생:", e); }
        }

        // 구 선택 및 지도 이동 함수
        function focusDistrict(guName, btn) {
            document.querySelectorAll('.gu-btn').forEach(b => {
                b.classList.remove('active');
                if(b.innerText === guName) b.classList.add('active');
            });

            if (guName !== '전체') {
                geojsonLayer.eachLayer(layer => {
                    if (layer.feature.properties.SIG_KOR_NM === guName) {
                        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
                    }
                });
            } else {
                map.setView([37.5665, 126.9780], 11);
            }
            renderList(guName);
        }

        // 오른쪽 사이드바 리스트 렌더링 함수
        function renderList(filterGu) {
            const listContainer = document.getElementById('restaurant-list');
            const filtered = filterGu === '전체' ? restaurantsData : restaurantsData.filter(r => r.gu === filterGu);
            listContainer.innerHTML = filtered.map(item => `
                <div class="restaurant-item" data-name="${item.name}">
                    <div class="res-name">${item.name}</div>
                    <div class="res-addr">${item.addr}</div>
                    <div class="res-badge">${item.star}</div>
                    <span class="res-cuisine">${item.cuisine}</span>
                </div>
            `).join('');
        }

        // 마커 클릭 시 리스트에서 해당 식당 강조 및 이동
        function highlightInList(name) {
            const items = document.querySelectorAll('.restaurant-item');
            items.forEach(item => {
                item.classList.remove('highlight');
                if (name.includes(item.dataset.name) || item.dataset.name.includes(name)) {
                    item.classList.add('highlight');
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
