<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Michelin Guide - Complete</title>
    <style>
        /* [1] 전체 화면 기본 설정 */
        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; display: flex; height: 100vh; background-color: #f4f4f4; }
        
        /* [2] 왼쪽 영역 (지도 & 상세페이지) */
        .left-panel { flex: 6; background-color: #e8e8e8; display: flex; justify-content: center; align-items: center; border-right: 2px solid #ccc; position: relative; overflow: hidden; }
        #map-view { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center; font-size: 2rem; color: #666; }
        #detail-view { display: none; width: 100%; height: 100%; background: white; padding: 50px; box-sizing: border-box; overflow-y: auto; }
        
        /* 상세 페이지 내부 텍스트 디자인 */
        .back-btn { padding: 10px 15px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-size: 1rem; }
        .back-btn:hover { background: #555; }
        .detail-title { font-size: 3rem; color: #a21927; margin: 0 0 10px 0; }
        .res-stars { color: #a21927; font-weight: bold; }
        .detail-desc { font-size: 1.2rem; line-height: 1.8; color: #444; margin-top: 20px; }

        /* [3] 오른쪽 영역 (필터 & 리스트) */
        .right-panel { flex: 4; display: flex; flex-direction: column; background-color: white; height: 100%; }
        .filter-section { padding: 20px; background-color: #a21927; color: white; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;}
        .btn { padding: 5px 12px; border: 2px solid white; background: transparent; color: white; border-radius: 20px; cursor: pointer; font-weight: bold;}
        .btn.active { background-color: white; color: #a21927; }
        
        .list-section { flex: 1; overflow-y: auto; padding: 20px; }
        .restaurant-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .restaurant-card:hover { border-color: #a21927; box-shadow: 0 2px 8px rgba(162, 25, 39, 0.2); background-color: #fdf5f6; }

        /* [4] 예약 팝업창 (모달) 디자인 */
        #reserve-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; position: relative; }
        .time-btn { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: white; }
        .time-btn:hover { background: #fdf5f6; border-color: #a21927; }
        .time-btn:disabled { background: #eee; color: #ccc; cursor: not-allowed; border-color: #eee; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="map-view">🗺️ 지도 화면 (필터를 누르거나 식당을 클릭해보세요!)</div>
        
        <div id="detail-view">
            <button onclick="showMap()" class="back-btn">⬅️ 지도로 돌아가기</button>
            <h1 id="dt-name" class="detail-title">이름</h1>
            <h3 id="dt-info">정보</h3>
            <h3 id="dt-stars" class="res-stars">별점</h3>
            <p id="dt-desc" class="detail-desc">설명</p>
            <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
            <button onclick="openReservationModal()" style="width:100%; padding:15px; background:#a21927; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; font-size:1.1rem;">🗓️ 예약하기</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="filter-section">
            <h3 style="margin:0;">🔍 맞춤 필터</h3>
            <div class="filter-buttons">
                <button class="btn filter-btn" data-category="grade" data-value="1">🌟 1 Star</button>
                <button class="btn filter-btn" data-category="grade" data-value="2">🌟🌟 2 Stars</button>
                <button class="btn filter-btn" data-category="cuisine" data-value="한식">🍚 한식</button>
                <button class="btn filter-btn" data-category="cuisine" data-value="양식">🍝 양식</button>
            </div>
        </div>

        <div class="list-section" id="restaurant-list">
            <p style="color:#777; text-align:center;">필터를 선택하면 식당이 나타납니다.</p>
        </div>
    </div>

    <div id="reserve-modal">
        <div class="modal-content">
            <h2 style="color:#a21927; margin-top:0;">📝 예약 신청</h2>
            <hr>
            
            <div id="time-selection">
                <p><strong>타임 선택</strong></p>
                <div id="time-slots">
                    <button class="time-btn" onclick="selectTime(1)">1타임 (12:00)</button>
                    <button class="time-btn" onclick="selectTime(2)">2타임 (14:00)</button>
                    <button class="time-btn" onclick="selectTime(3)">3타임 (18:00)</button>
                    <button class="time-btn" onclick="selectTime(4)">4타임 (20:00)</button>
                </div>
            </div>

            <div id="user-info-section" style="display:none; margin-top:20px;">
                <p><strong>예약자 정보</strong></p>
                <input type="text" id="res-name" placeholder="예약자 성함" style="width:100%; box-sizing:border-box; padding:10px; margin-bottom:10px;">
                <input type="text" id="res-phone" placeholder="전화번호" style="width:100%; box-sizing:border-box; padding:10px; margin-bottom:10px;">
                <button onclick="confirmReservation()" style="width:100%; padding:15px; background:#a21927; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">최종 예약 확정</button>
            </div>

            <button onclick="closeModal()" style="position:absolute; top:15px; right:15px; border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
    </div>

    <script>
        /* ------------------------------------------------
           1. 다중 필터 및 리스트 그리기 로직
        ------------------------------------------------ */
        let selectedFilters = { grade: [], cuisine: [] };

        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(button => {
            button.addEventListener('click', function() {
                this.classList.toggle('active');
                const category = this.getAttribute('data-category');
                const value = this.getAttribute('data-value');

                if (this.classList.contains('active')) {
                    selectedFilters[category].push(value);
                } else {
                    selectedFilters[category] = selectedFilters[category].filter(v => v !== value);
                }
                fetchRestaurantsFromServer();
            });
        });

        function fetchRestaurantsFromServer() {
            fetch('http://127.0.0.1:5000/api/filter', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(selectedFilters)
            })
            .then(response => response.json())
            .then(data => drawList(data))
            .catch(error => console.error('에러:', error));
        }

        function drawList(restaurants) {
            const listContainer = document.getElementById('restaurant-list');
            listContainer.innerHTML = ''; 

            if (restaurants.length === 0) {
                listContainer.innerHTML = '<p style="color:#777; text-align:center;">조건에 맞는 식당이 없습니다.</p>';
                return;
            }

            restaurants.forEach(res => {
                const card = `
                    <div class="restaurant-card" onclick="showDetail('${res.id}', '${res.name}', '${res.address} | ${res.cuisine}', '${res.grade} Stars', '${res.price}')">
                        <p style="font-size: 1.2rem; font-weight: bold; margin: 0 0 5px 0;">${res.name}</p>
                        <p style="font-size: 0.9rem; color: #777; margin: 0;">${res.address} | ${res.cuisine}</p>
                        <p style="color: #a21927; font-weight: bold; margin-top:5px;">${res.grade} Stars</p>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        /* ------------------------------------------------
           2. 화면 전환 로직
        ------------------------------------------------ */
        let currentRestaurantId = null; // 예약할 때 쓰려고 식당 ID를 기억해둡니다!

        function showDetail(id, name, info, stars, price) {
            currentRestaurantId = id; // 아이디 저장
            document.getElementById('map-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('dt-name').innerText = name;
            document.getElementById('dt-info').innerText = info;
            document.getElementById('dt-stars').innerText = stars;
            document.getElementById('dt-desc').innerText = "평균 가격대: " + price;
        }

        function showMap() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('map-view').style.display = 'flex';
        }

        /* ------------------------------------------------
           3. 예약 팝업 로직
        ------------------------------------------------ */
        let selectedTimeSlot = null;

        function openReservationModal() {
            document.getElementById('reserve-modal').style.display = 'flex';
            
            // 팝업이 열릴 때, 서버에 "이 식당의 예약된 시간들 좀 알려줘!" 하고 요청합니다.
            fetch(`http://127.0.0.1:5000/api/check_reservation?restaurant_id=${currentRestaurantId}`)
            .then(res => res.json())
            .then(data => {
                const reservedTimes = data.reserved_times; // 예: [1, 3] (1타임, 3타임 예약됨)
                const timeButtons = document.querySelectorAll('.time-btn');
                
                // 버튼 상태 초기화 및 중복 체크
                timeButtons.forEach((btn, index) => {
                    const timeNum = index + 1;
                    btn.disabled = false;
                    btn.innerText = `${timeNum}타임`; // 원래 이름으로 돌려놓기
                    
                    if(reservedTimes.includes(timeNum)) {
                        btn.disabled = true; // 버튼 비활성화!
                        btn.innerText = `${timeNum}타임 (마감)`;
                    }
                });
            });
        }

        function closeModal() {
            document.getElementById('reserve-modal').style.display = 'none';
            document.getElementById('user-info-section').style.display = 'none';
            document.getElementById('res-name').value = '';
            document.getElementById('res-phone').value = '';
            selectedTimeSlot = null;
        }

        function selectTime(time) {
            selectedTimeSlot = time;
            alert(time + "타임을 선택하셨습니다. 아래에 정보를 입력해주세요.");
            document.getElementById('user-info-section').style.display = 'block';
        }

        function confirmReservation() {
            const name = document.getElementById('res-name').value;
            const phone = document.getElementById('res-phone').value;

            if(!name || !phone) {
                alert("이름과 전화번호를 모두 입력해주세요!");
                return;
            }

            const isConfirmed = confirm(`[예약 정보]\n성함: ${name}\n연락처: ${phone}\n\n이 정보로 예약하시겠습니까?`);

            if(isConfirmed) {
                // 예약 정보를 서버로 보냅니다.
                const reserveData = {
                    restaurant_id: currentRestaurantId,
                    reserve_time: selectedTimeSlot,
                    user_name: name,
                    user_phone: phone
                };

                fetch('http://127.0.0.1:5000/api/make_reservation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reserveData)
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        alert("예약이 확정되었습니다!");
                        closeModal();
                    } else {
                        alert("앗! 누군가 방금 먼저 예약했습니다. 다른 시간을 선택해주세요.");
                        closeModal();
                    }
                });
            }
        }
    </script>
</body>
</html>
