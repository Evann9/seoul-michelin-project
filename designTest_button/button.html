<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
/* 10. 태그 스타일 CSS */
.filter-section { background-color: #f9f9f9; padding: 20px; }
.btn { 
    padding: 6px 12px; 
    border: none; 
    background: #eaedf0; 
    color: #4a5568; 
    border-radius: 4px; /* 살짝 각진 형태 */
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.2s;
}
/* 가상 요소를 사용해 앞에 '#' 기호 추가 */
.btn::before { content: '# '; color: #a0aec0; }
.btn:hover { background: #e2e8f0; }
.btn.active { 
    background: #a21927; 
    color: white; 
}
.btn.active::before { color: #ffcccc; } /* 활성화 시 '#' 색상도 변경 */
    </style>
</head>
<body>
<div class="filter-buttons">
    <button class="btn active">전체</button>
    <button class="btn">🌟 1 Star</button>
    <button class="btn">🌟🌟 2 Stars</button>
    <button class="btn">🌟🌟🌟 3 Stars</button>
    <button class="btn">한식</button>
    <button class="btn">양식</button>
    <button class="btn">중식</button>
</div>
</body>
</html>
